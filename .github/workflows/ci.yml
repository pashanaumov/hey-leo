name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate themes
        run: npm run generate

      - name: Validate generated files are committed
        run: git diff --exit-code

      - name: Validate package contents
        run: npm run package:check

      - name: Build VSIX
        run: npx @vscode/vsce package --out leo-themes-ci.vsix
